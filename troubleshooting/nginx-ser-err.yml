apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod7
  labels:
    app: myapp
spec:
  containers:
  - name: test-container
    image: nginx
    ports:
      - containerPort: 80

---
apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: myapp
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

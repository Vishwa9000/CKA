apiVersion: v1
kind: Pod
metadata:
  name: nginx-pod3
  labels:
    app: nginx
spec:
  containers:
    - name: nginx-container
      image: nginx:latest
      ports:
        - containerPort: 80
      resources:
        limits:
          cpu: "4m"
          memory: "4Mi"
        limits:
          cpu: "5m"
          memory: "5Mi"

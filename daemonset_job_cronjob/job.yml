apiVersion: batch/v1
kind: Job
metadata:
  name: demo-job
spec:
  completions: 1
  parallelism: 1
  backoffLimit: 3
  activeDeadlineSeconds: 60
  template:
    spec:
      restartPolicy: Never
      containers:
        - name: worker
          image: busybox:1.28
          command: ["sh", "-c", "echo 'Hello from Kubernetes Job at $(date)'; sleep 5"]
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
